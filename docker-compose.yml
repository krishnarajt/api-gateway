services:
  redis:
    image: redis:7-alpine
    container_name: api-gateway-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ./redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:15-alpine
    container_name: api-gateway-postgres
    environment:
      - POSTGRES_USER=api_gateway
      - POSTGRES_PASSWORD=api_gateway
      - POSTGRES_DB=api_gateway
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U api_gateway -d api_gateway"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-gateway:
    build: .
    container_name: api-gateway
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "5000:5000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PORT=5000
      - DATABASE_URL=postgresql://api_gateway:api_gateway@postgres:5432/api_gateway
      - DB_SCHEMA=api_gateway
    volumes:
      # Used once to seed the Postgres config row when the DB is empty.
      - ./config.yml:/usr/src/app/config.yml:ro
    restart: unless-stopped

volumes:
  postgres_data:
