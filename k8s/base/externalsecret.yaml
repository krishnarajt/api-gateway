apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: api-gateway-env
  namespace: api-gateway
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: api-gateway-env
    creationPolicy: Owner
  dataFrom:
    # Expected Vault keys now include:
    #   DATABASE_URL: "postgresql://api_gateway:<pw>@<host>:5432/api_gateway"
    #   DB_SCHEMA:    "api_gateway"
    - extract:
        key: apps/api-get-away/api-get-away/env
